<div id="dashboard" class="hidden min-h-screen bg-slate-950 text-slate-200">
    <div class="flex">
        <aside class="w-64 bg-slate-900 h-screen sticky top-0 p-6 border-r border-slate-800 hidden md:block">
            <h2 class="text-blue-500 font-black text-xl mb-10 italic">SMILE PRO v3.0</h2>
            <nav class="space-y-6">
                <a href="#" class="flex items-center text-blue-400 font-bold"><i class="fas fa-chart-pie mr-3"></i> Overview</a>
                <a href="#" class="flex items-center hover:text-white"><i class="fas fa-box mr-3"></i> Inventory/Products</a>
                <a href="#" class="flex items-center hover:text-white"><i class="fas fa-users-cog mr-3"></i> Team Leads</a>
                <a href="#" class="flex items-center hover:text-white"><i class="fas fa-bullhorn mr-2"></i> Bulk Marketing</a>
            </nav>
        </aside>

        <main class="flex-1 p-8">
            <div class="flex justify-between items-center mb-10">
                <h1 class="text-3xl font-black">Control Center</h1>
                <div class="flex space-x-4">
                    <span class="bg-green-500/10 text-green-500 border border-green-500/20 px-4 py-2 rounded-xl text-xs font-bold">SERVER: LIVE (ASIA)</span>
                    <button onclick="location.reload()" class="bg-red-600 px-6 py-2 rounded-xl font-bold text-xs uppercase">Logout</button>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-10">
                <div class="bg-slate-900 p-6 rounded-3xl border border-slate-800">
                    <p class="text-slate-500 text-[10px] font-bold uppercase">Today's Traffic</p>
                    <h3 id="clickStats" class="text-3xl font-black text-white">1,240</h3>
                </div>
                <div class="bg-slate-900 p-6 rounded-3xl border border-slate-800">
                    <p class="text-slate-500 text-[10px] font-bold uppercase">Conversion Rate</p>
                    <h3 class="text-3xl font-black text-blue-500">12.4%</h3>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
                <div class="lg:col-span-5 bg-slate-900 p-8 rounded-[2.5rem] border border-slate-800 shadow-2xl">
                    <h2 class="text-sm font-black text-blue-400 mb-6 uppercase tracking-widest italic">1. Launch/Edit Campaign</h2>
                    <div class="space-y-4">
                        <input id="admName" type="text" placeholder="Product Name" class="w-full bg-slate-950 p-4 rounded-2xl border border-slate-800 outline-none focus:ring-1 ring-blue-500">
                        <div class="grid grid-cols-2 gap-4">
                            <input id="admPayout" type="text" placeholder="Payout Amount" class="bg-slate-950 p-4 rounded-2xl border border-slate-800 outline-none">
                            <select id="admCat" class="bg-slate-950 p-4 rounded-2xl border border-slate-800 outline-none">
                                <option value="credit-card">Credit Card</option>
                                <option value="loan">Loans</option>
                            </select>
                        </div>
                        <input id="admLink" type="text" placeholder="Affiliate Tracking URL" class="w-full bg-slate-950 p-4 rounded-2xl border border-slate-800 font-mono text-blue-400">
                        <button onclick="publishCampaign()" class="w-full bg-blue-600 py-5 rounded-2xl font-black text-lg shadow-xl shadow-blue-600/20 active:scale-95 transition-all uppercase">Blast Offer Live</button>
                    </div>
                </div>

                <div class="lg:col-span-7 space-y-8">
                    <div class="bg-slate-900 p-8 rounded-[2.5rem] border border-slate-800">
                        <h2 class="text-sm font-black text-slate-500 mb-6 uppercase">Active Inventory (Manage/Delete)</h2>
                        <div id="inventoryList" class="space-y-4 h-96 overflow-y-auto custom-scroll pr-2">
                            </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

<script>
    // --- DELETE LOGIC (The Professional Way) ---
    function deleteProduct(prodID) {
        if(confirm("Bhai, kya aap waqai is offer ko website se hatana chahte hain?")) {
            database.ref('products/' + prodID).remove()
            .then(() => alert("Product Deleted Successfully!"))
            .catch(err => alert("Error: " + err));
        }
    }

    // --- RE-SYNC DATA WITH DELETE BUTTONS ---
    database.ref('products/').on('value', (snapshot) => {
        const invList = document.getElementById('inventoryList');
        invList.innerHTML = "";
        snapshot.forEach((child) => {
            const p = child.val();
            const id = child.key;
            invList.innerHTML += `
                <div class="flex items-center justify-between bg-slate-950 p-4 rounded-2xl border border-slate-800">
                    <div class="flex items-center space-x-4">
                        <img src="${p.image}" class="w-10 h-10 rounded-lg object-contain">
                        <div>
                            <p class="font-bold text-sm">${p.name}</p>
                            <p class="text-[10px] text-green-500 font-bold tracking-widest uppercase">Payout: ₹${p.payout}</p>
                        </div>
                    </div>
                    <div class="flex space-x-2">
                        <button class="text-slate-500 hover:text-white text-xs"><i class="fas fa-edit"></i></button>
                        <button onclick="deleteProduct('${id}')" class="text-red-500/50 hover:text-red-500 text-xs"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            `;
        });
    });
</script>
