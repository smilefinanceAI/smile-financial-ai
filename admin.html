<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Admin Login - Smile Finance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-900 flex items-center justify-center min-h-screen">

    <div id="login-box" class="bg-white p-8 rounded-3xl shadow-2xl w-96">
        <h2 class="text-2xl font-black text-center text-slate-800 mb-6 uppercase">Admin Login</h2>
        <input id="adminID" type="text" placeholder="User ID (Aarif@786)" class="w-full p-4 border rounded-xl mb-4 outline-none focus:ring-2 ring-blue-500">
        <input id="adminPass" type="password" placeholder="Password" class="w-full p-4 border rounded-xl mb-6 outline-none focus:ring-2 ring-blue-500">
        <button onclick="checkAuth()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-black hover:bg-blue-700 transition-all">UNLOOCK DASHBOARD</button>
    </div>

    <div id="dashboard" class="hidden w-full h-screen overflow-y-auto p-6 bg-slate-950 text-white">
        <div class="max-w-7xl mx-auto">
            <div class="flex justify-between items-center mb-10 border-b border-slate-800 pb-6">
                <h2 class="text-2xl font-black text-blue-400 italic">Smile Finance - Command Center</h2>
                <button onclick="location.reload()" class="bg-red-500/10 text-red-500 px-4 py-2 rounded-lg text-xs font-bold uppercase border border-red-500/20">Logout</button>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
                <div class="bg-slate-900 p-8 rounded-3xl border border-slate-800">
                    <h3 class="text-blue-300 font-bold mb-6 uppercase tracking-widest"><i class="fas fa-plus-circle mr-2"></i> Launch New Campaign</h3>
                    <div class="space-y-4">
                        <input id="admName" type="text" placeholder="Product Name" class="w-full bg-slate-950 p-4 rounded-xl border border-slate-800 outline-none focus:ring-1 ring-blue-500">
                        <div class="grid grid-cols-2 gap-4">
                            <select id="admCat" class="bg-slate-950 p-4 rounded-xl border border-slate-800 text-sm outline-none">
                                <option value="credit-card">Credit Card</option>
                                <option value="loan">Loans</option>
                                <option value="insurance">Insurance</option>
                                <option value="saving-account">Savings</option>
                            </select>
                            <input id="admPayout" type="text" placeholder="Payout ₹" class="bg-slate-950 p-4 rounded-xl border border-slate-800 outline-none">
                        </div>
                        <input id="admImg" type="text" placeholder="Image URL (Leave empty for Pexels AI)" class="w-full bg-slate-950 p-4 rounded-xl border border-slate-800 outline-none">
                        <input id="admLink" type="text" placeholder="Affiliate/Tracking Link" class="w-full bg-slate-950 p-4 rounded-xl border border-slate-800 font-mono text-blue-300">
                        <textarea id="admDesc" placeholder="Key Benefits (Point wise)" class="w-full bg-slate-950 p-4 rounded-xl border border-slate-800 h-24 outline-none"></textarea>
                        
                        <button onclick="publishCampaign()" class="w-full bg-blue-600 py-5 rounded-2xl font-black text-lg shadow-xl shadow-blue-900/40">PUBLISH & AUTOMATE</button>
                    </div>
                </div>

                <div class="space-y-10">
                    <div class="bg-slate-900 p-6 rounded-3xl border border-slate-800">
                        <h3 class="text-green-400 font-bold mb-4 uppercase text-sm"><i class="fab fa-whatsapp mr-2"></i> Bulk Marketing Hub</h3>
                        <div class="flex space-x-4">
                            <button class="flex-1 bg-green-600/20 text-green-500 p-4 rounded-xl border border-green-500/20 font-bold text-xs uppercase">Send Bulk Poster</button>
                            <button class="flex-1 bg-blue-600/20 text-blue-500 p-4 rounded-xl border border-blue-500/20 font-bold text-xs uppercase">Broadcast Link</button>
                        </div>
                    </div>

                    <div class="bg-slate-900 p-6 rounded-3xl border border-slate-800 h-80 overflow-y-auto">
                        <h3 class="text-slate-400 font-bold mb-4 uppercase text-sm">Real-time Lead Tracker</h3>
                        <table class="w-full text-xs text-left">
                            <tbody id="leadData"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyD3FEfP9Htj3ANvIENwzlNIKZRE7qIYFBc",
            authDomain: "smile-finance-ai-2026.firebaseapp.com",
            databaseURL: "https://smile-finance-ai-2026-default-rtdb.firebaseio.com",
            projectId: "smile-finance-ai-2026",
            storageBucket: "smile-finance-ai-2026.firebasestorage.app",
            messagingSenderId: "325593143394",
            appId: "1:325593143394:web:2b5f3c2404279d4594d93b"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const makeURL = "https://hook.eu1.make.com/n8tkfx86y526ml5qjr7dxn02n3r53dlr";
        const pexelsKey = "7TEShXts406lDUgqHkVLnXRa1s6nepx5kb9tDtAUFetmTDpqrASG5mjR";

        // AUTHENTICATION LOGIC
        function checkAuth() {
            const id = document.getElementById('adminID').value;
            const pass = document.getElementById('adminPass').value;
            if(id === "Aarif@786" && pass === "Aarif@#786") {
                document.getElementById('login-box').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                loadLeads();
            } else {
                alert("Galat Password Hai Bhai!");
            }
        }

        async function publishCampaign() {
            let imgURL = document.getElementById('admImg').value;
            const prodName = document.getElementById('admName').value;
            if(!imgURL) {
                const res = await fetch(`https://api.pexels.com/v1/search?query=${prodName}&per_page=1`, {
                    headers: { Authorization: pexelsKey }
                });
                const json = await res.json();
                imgURL = json.photos[0] ? json.photos[0].src.medium : "https://via.placeholder.com/300";
            }
            const payload = {
                name: prodName,
                category: document.getElementById('admCat').value,
                payout: document.getElementById('admPayout').value,
                image: imgURL,
                link: document.getElementById('admLink').value,
                desc: document.getElementById('admDesc').value,
                timestamp: new Date().toLocaleString()
            };
            database.ref('products/').push(payload);
            fetch(makeURL, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
            alert("Live ho gaya!");
        }

        function loadLeads() {
            database.ref('leads/').on('value', (snap) => {
                const table = document.getElementById('leadData');
                table.innerHTML = "";
                snap.forEach(child => {
                    const lead = child.val();
                    table.innerHTML += `<tr class="border-b border-slate-800"><td class="py-3 font-bold text-blue-400">${lead.product_name}</td><td class="py-3 text-slate-500">${lead.channel}</td></tr>`;
                });
            });
        }
    </script>
</body>
</html>
