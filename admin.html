<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smile Finance - Management Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-[#0f172a] text-slate-200 font-sans">

    <div id="login-overlay" class="fixed inset-0 z-[100] bg-slate-950 flex items-center justify-center p-6">
        <div class="bg-white p-10 rounded-[2.5rem] w-full max-w-md shadow-2xl">
            <h2 class="text-3xl font-black text-slate-900 mb-2">SYSTEM ACCESS</h2>
            <p class="text-slate-500 text-xs font-bold mb-8 uppercase tracking-widest">Aarif Enterprise Console</p>
            <input id="adminID" type="text" placeholder="Admin ID" class="w-full p-4 bg-slate-100 rounded-2xl mb-4 border-none outline-none focus:ring-2 ring-blue-500 text-slate-900 font-bold">
            <input id="adminPass" type="password" placeholder="Password" class="w-full p-4 bg-slate-100 rounded-2xl mb-8 border-none outline-none focus:ring-2 ring-blue-500 text-slate-900">
            <button onclick="checkAuth()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black text-lg shadow-xl shadow-blue-200">AUTHENTICATE</button>
        </div>
    </div>

    <div id="main-panel" class="hidden flex flex-col md:flex-row min-h-screen">
        
        <aside class="w-full md:w-72 bg-[#1e293b] p-8 flex flex-col border-r border-slate-800">
            <div class="mb-12">
                <h1 class="text-2xl font-black text-blue-500 italic">SMILE PRO</h1>
                <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">v4.2 Enterprise</p>
            </div>
            <nav class="space-y-4 flex-1">
                <button class="w-full flex items-center p-4 bg-blue-600 rounded-2xl text-sm font-bold shadow-lg shadow-blue-900/40"><i class="fas fa-layer-group mr-3"></i> Operations</button>
                <button class="w-full flex items-center p-4 hover:bg-slate-800 rounded-2xl text-sm font-bold text-slate-400 transition-all"><i class="fas fa-bullhorn mr-3"></i> Marketing</button>
                <button class="w-full flex items-center p-4 hover:bg-slate-800 rounded-2xl text-sm font-bold text-slate-400 transition-all"><i class="fas fa-users-cog mr-3"></i> Team Tracking</button>
            </nav>
            <button onclick="location.reload()" class="p-4 text-red-400 text-xs font-bold uppercase tracking-widest hover:text-red-300">Terminate Session</button>
        </aside>

        <main class="flex-1 p-6 md:p-12 overflow-y-auto max-h-screen no-scrollbar">
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
                <div class="glass-card p-8 rounded-[2rem]">
                    <p class="text-[10px] text-slate-500 font-black uppercase mb-2">Total Live Leads</p>
                    <h3 id="statLeads" class="text-4xl font-black text-white">0</h3>
                </div>
                <div class="glass-card p-8 rounded-[2rem]">
                    <p class="text-[10px] text-slate-500 font-black uppercase mb-2">Active Inventory</p>
                    <h3 id="statProducts" class="text-4xl font-black text-blue-400">0</h3>
                </div>
                <div class="glass-card p-8 rounded-[2rem] border-blue-500/20">
                    <p class="text-[10px] text-slate-500 font-black uppercase mb-2">System Status</p>
                    <div class="flex items-center text-green-400 font-black text-xl"><span class="w-3 h-3 bg-green-500 rounded-full mr-3 animate-ping"></span> ONLINE</div>
                </div>
            </div>

            <div class="grid grid-cols-1 xl:grid-cols-12 gap-10">
                
                <div class="xl:col-span-5 space-y-8">
                    <section class="glass-card p-8 rounded-[2.5rem]">
                        <h2 class="text-xl font-black mb-8 border-b border-slate-800 pb-4 flex items-center">
                            <i class="fas fa-rocket text-blue-500 mr-3"></i> Launch Campaign
                        </h2>
                        <div class="space-y-5">
                            <input id="admName" type="text" placeholder="Product Label (e.g. Mudra Loan)" class="w-full bg-slate-900/50 p-5 rounded-2xl border border-slate-700 outline-none focus:border-blue-500 font-bold">
                            <div class="grid grid-cols-2 gap-4">
                                <select id="admCat" class="bg-slate-900/50 p-5 rounded-2xl border border-slate-700 outline-none text-sm font-bold">
                                    <option value="credit-card">Credit Card</option>
                                    <option value="loan">Loans</option>
                                    <option value="insurance">Insurance</option>
                                </select>
                                <input id="admPayout" type="text" placeholder="Payout ₹" class="bg-slate-900/50 p-5 rounded-2xl border border-slate-700 outline-none font-bold">
                            </div>
                            <input id="admLink" type="text" placeholder="Affiliate Tracking URL" class="w-full bg-slate-900/50 p-5 rounded-2xl border border-slate-700 outline-none font-mono text-blue-400 text-sm">
                            <textarea id="admDesc" placeholder="Product Benefits (One per line)" class="w-full bg-slate-900/50 p-5 rounded-2xl border border-slate-700 h-32 outline-none text-sm"></textarea>
                            
                            <div class="p-6 bg-blue-600/5 rounded-2xl border border-blue-500/20">
                                <p class="text-[10px] font-black text-blue-500 mb-4 uppercase">Automation Handlers Active</p>
                                <div class="flex justify-between text-2xl text-slate-600">
                                    <i class="fab fa-facebook hover:text-blue-500 transition-all cursor-pointer"></i>
                                    <i class="fab fa-instagram hover:text-pink-500 transition-all cursor-pointer"></i>
                                    <i class="fab fa-whatsapp hover:text-green-500 transition-all cursor-pointer"></i>
                                    <i class="fab fa-linkedin hover:text-blue-400 transition-all cursor-pointer"></i>
                                </div>
                            </div>
                            
                            <button onclick="deployCampaign()" id="deployBtn" class="w-full bg-blue-600 py-6 rounded-3xl font-black text-xl hover:bg-blue-700 transition-all shadow-2xl shadow-blue-900/40 uppercase">Deploy Everywhere</button>
                        </div>
                    </section>
                </div>

                <div class="xl:col-span-7 space-y-8">
                    <section class="glass-card p-8 rounded-[2.5rem]">
                        <h2 class="text-sm font-black text-slate-500 mb-6 uppercase tracking-widest">Inventory Management</h2>
                        <div id="inventory-list" class="space-y-4 max-h-[400px] overflow-y-auto no-scrollbar pr-2">
                            </div>
                    </section>

                    <section class="glass-card p-8 rounded-[2.5rem]">
                        <h2 class="text-sm font-black text-slate-500 mb-6 uppercase tracking-widest">Real-time Lead Tracker</h2>
                        <div class="overflow-hidden rounded-2xl border border-slate-800">
                            <table class="w-full text-left text-xs">
                                <thead class="bg-slate-800/50 text-slate-500 font-bold uppercase">
                                    <tr>
                                        <th class="p-4">Lead ID</th>
                                        <th class="p-4">Product</th>
                                        <th class="p-4">Channel</th>
                                        <th class="p-4 text-right">Action</th>
                                    </tr>
                                </thead>
                                <tbody id="lead-list" class="divide-y divide-slate-800">
                                    </tbody>
                            </table>
                        </div>
                    </section>
                </div>

            </div>
        </main>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD3FEfP9Htj3ANvIENwzlNIKZRE7qIYFBc",
            authDomain: "smile-finance-ai-2026.firebaseapp.com",
            databaseURL: "https://smile-finance-ai-2026-default-rtdb.firebaseio.com",
            projectId: "smile-finance-ai-2026",
            storageBucket: "smile-finance-ai-2026.firebasestorage.app",
            messagingSenderId: "325593143394",
            appId: "1:325593143394:web:2b5f3c2404279d4594d93b"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const makeURL = "https://hook.eu1.make.com/n8tkfx86y526ml5qjr7dxn02n3r53dlr";
        const pexelsKey = "7TEShXts406lDUgqHkVLnXRa1s6nepx5kb9tDtAUFetmTDpqrASG5mjR";

        // AUTHENTICATION
        function checkAuth() {
            const id = document.getElementById('adminID').value;
            const pass = document.getElementById('adminPass').value;
            if(id === "Aarif@786" && pass === "Aarif@#786") {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('main-panel').classList.remove('hidden');
                syncData();
            } else {
                alert("ACCESS DENIED: Unauthorized Credentials.");
            }
        }

        // DEPLOY CAMPAIGN (THE CORE ENGINE)
        async function deployCampaign() {
            const btn = document.getElementById('deployBtn');
            const name = document.getElementById('admName').value;
            const payout = document.getElementById('admPayout').value;
            
            if(!name || !payout) return alert("Pehle Campaign Details bhariye.");

            btn.innerText = "Processing AI Assets...";
            btn.disabled = true;

            // Step 1: Pexels AI Image Fetch
            const res = await fetch(`https://api.pexels.com/v1/search?query=${name}&per_page=1`, {
                headers: { Authorization: pexelsKey }
            });
            const json = await res.json();
            const img = json.photos[0] ? json.photos[0].src.large : "https://via.placeholder.com/800";

            const campaignData = {
                name: name,
                category: document.getElementById('admCat').value,
                payout: payout,
                image: img,
                link: document.getElementById('admLink').value,
                desc: document.getElementById('admDesc').value,
                created_at: Date.now()
            };

            // Step 2: Push to Firebase (Web Live)
            const newRef = database.ref('products/').push();
            await newRef.set(campaignData);

            // Step 3: Trigger Make.com (Social Marketing Blast)
            await fetch(makeURL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(campaignData)
            });

            btn.innerText = "Deploy Everywhere";
            btn.disabled = false;
            alert("Success: Website updated & Social Media Blast completed.");
            document.getElementById('admName').value = "";
        }

        // SYNC REAL-TIME DATA
        function syncData() {
            // Products List with Delete
            database.ref('products/').on('value', snap => {
                const list = document.getElementById('inventory-list');
                document.getElementById('statProducts').innerText = snap.numChildren();
                list.innerHTML = "";
                snap.forEach(child => {
                    const p = child.val();
                    list.innerHTML += `
                        <div class="bg-slate-900/50 p-5 rounded-2xl flex items-center justify-between border border-slate-800">
                            <div class="flex items-center space-x-4">
                                <img src="${p.image}" class="w-12 h-12 rounded-xl object-cover border border-slate-700">
                                <div>
                                    <p class="font-black text-sm">${p.name}</p>
                                    <p class="text-[10px] text-blue-500 font-bold uppercase tracking-widest">${p.category} | ₹${p.payout}</p>
                                </div>
                            </div>
                            <button onclick="deleteProduct('${child.key}')" class="text-slate-600 hover:text-red-500 transition-all px-3"><i class="fas fa-trash-alt"></i></button>
                        </div>
                    `;
                });
            });

            // Leads Tracker
            database.ref('leads/').on('value', snap => {
                const list = document.getElementById('lead-list');
                document.getElementById('statLeads').innerText = snap.numChildren();
                list.innerHTML = "";
                snap.forEach(child => {
                    const l = child.val();
                    list.innerHTML += `
                        <tr class="hover:bg-slate-800/30">
                            <td class="p-4 font-mono text-blue-300">#${child.key.substring(1, 6)}</td>
                            <td class="p-4 font-bold">${l.product_name}</td>
                            <td class="p-4 font-bold text-slate-500 text-[10px] uppercase">${l.channel || 'Organic'}</td>
                            <td class="p-4 text-right"><span class="bg-green-500/10 text-green-500 px-2 py-1 rounded-full text-[8px] font-black uppercase">Active</span></td>
                        </tr>
                    `;
                });
            });
        }

        function deleteProduct(id) {
            if(confirm("Confirm: Delete this product from live website?")) {
                database.ref('products/' + id).remove();
            }
        }
    </script>
</body>
</html>
