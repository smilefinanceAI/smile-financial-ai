<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smile Finance - Pro Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 flex">

    <div class="w-64 bg-blue-900 min-h-screen text-white p-5 hidden md:block">
        <h2 class="text-2xl font-bold mb-10">Smile Admin</h2>
        <nav class="space-y-4">
            <a href="#" class="block p-3 bg-blue-800 rounded"><i class="fas fa-home mr-2"></i> Dashboard</a>
            <a href="#" class="block p-3 hover:bg-blue-700 rounded"><i class="fas fa-plus-circle mr-2"></i> Add Products</a>
            <a href="#" class="block p-3 hover:bg-blue-700 rounded"><i class="fas fa-users mr-2"></i> Lead Tracker</a>
            <a href="#" class="block p-3 hover:bg-blue-700 rounded"><i class="fas fa-bullhorn mr-2"></i> Marketing Tools</a>
            <a href="#" class="block p-3 hover:bg-blue-700 rounded"><i class="fas fa-chart-line mr-2"></i> Analytics</a>
        </nav>
    </div>

    <div class="flex-1 p-8">
        
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-10">
            <div class="bg-white p-6 rounded-xl shadow-sm border-l-4 border-blue-500">
                <p class="text-gray-500 text-sm">Total Leads</p>
                <h3 id="statLeads" class="text-2xl font-bold">0</h3>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border-l-4 border-green-500">
                <p class="text-gray-500 text-sm">Active Offers</p>
                <h3 id="statOffers" class="text-2xl font-bold">0</h3>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
            
            <div class="bg-white p-8 rounded-2xl shadow-lg">
                <h2 class="text-xl font-bold mb-6 italic"><i class="fas fa-rocket mr-2"></i> Launch New Campaign</h2>
                <div class="space-y-4">
                    <input id="prodName" type="text" placeholder="Offer Name (e.g. HDFC Credit Card)" class="w-full p-3 border rounded-lg">
                    <div class="flex space-x-4">
                        <select id="prodCat" class="w-1/2 p-3 border rounded-lg">
                            <option value="credit-card">Credit Card</option>
                            <option value="loan">Business Loan</option>
                            <option value="insurance">Insurance</option>
                        </select>
                        <input id="prodPayout" type="text" placeholder="Payout (e.g. ₹2500)" class="w-1/2 p-3 border rounded-lg">
                    </div>
                    <input id="prodLink" type="text" placeholder="Affiliate Link" class="w-full p-3 border rounded-lg">
                    <input id="prodImg" type="text" placeholder="Banner Image URL" class="w-full p-3 border rounded-lg">
                    <textarea id="prodDesc" placeholder="Marketing Description & Keywords" class="w-full p-3 border rounded-lg h-24"></textarea>
                    
                    <div class="p-4 bg-blue-50 rounded-lg">
                        <p class="text-xs font-bold text-blue-800 mb-3">AUTO-POST TO SOCIAL CHANNELS:</p>
                        <div class="flex space-x-3 text-xl">
                            <i class="fab fa-facebook text-blue-600 cursor-pointer"></i>
                            <i class="fab fa-instagram text-pink-500 cursor-pointer"></i>
                            <i class="fab fa-whatsapp text-green-500 cursor-pointer"></i>
                            <i class="fab fa-youtube text-red-600 cursor-pointer"></i>
                            <i class="fab fa-twitter text-blue-400 cursor-pointer"></i>
                        </div>
                    </div>

                    <button onclick="saveProduct()" class="w-full bg-blue-600 text-white p-4 rounded-xl font-bold hover:bg-blue-700 shadow-lg">
                        Publish & Track All Channels
                    </button>
                </div>
            </div>

            <div class="bg-white p-8 rounded-2xl shadow-lg overflow-hidden">
                <h2 class="text-xl font-bold mb-6"><i class="fas fa-list mr-2"></i> Real-time Lead Tracker</h2>
                <div class="overflow-y-auto h-[450px]">
                    <table class="w-full text-left">
                        <thead class="bg-gray-100 text-xs uppercase">
                            <tr>
                                <th class="p-3">Customer</th>
                                <th class="p-3">Product</th>
                                <th class="p-3">Status</th>
                            </tr>
                        </thead>
                        <tbody id="leadTable" class="text-sm">
                            </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD3FEfP9Htj3ANvIENwzlNIKZRE7qIYFBc",
            authDomain: "smile-finance-ai-2026.firebaseapp.com",
            databaseURL: "https://smile-finance-ai-2026-default-rtdb.firebaseio.com",
            projectId: "smile-finance-ai-2026",
            storageBucket: "smile-finance-ai-2026.firebasestorage.app",
            messagingSenderId: "325593143394",
            appId: "1:325593143394:web:2b5f3c2404279d4594d93b"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // 1. Save Product & Logic
        function saveProduct() {
            const data = {
                name: document.getElementById('prodName').value,
                category: document.getElementById('prodCat').value,
                payout: document.getElementById('prodPayout').value,
                link: document.getElementById('prodLink').value,
                image: document.getElementById('prodImg').value,
                desc: document.getElementById('prodDesc').value,
                timestamp: Date.now()
            };
            database.ref('products/').push(data).then(() => alert("Marketing Campaign Live!"));
        }

        // 2. Real-time Listeners for Stats
        database.ref('products/').on('value', snap => {
            document.getElementById('statOffers').innerText = snap.numChildren();
        });

        database.ref('leads/').on('value', snap => {
            document.getElementById('statLeads').innerText = snap.numChildren();
            const table = document.getElementById('leadTable');
            table.innerHTML = "";
            snap.forEach(child => {
                const lead = child.val();
                table.innerHTML += `<tr class="border-b">
                    <td class="p-3">${lead.cust_name || 'Visitor'}</td>
                    <td class="p-3 font-bold">${lead.product_name || 'Click'}</td>
                    <td class="p-3"><span class="bg-green-100 text-green-700 px-2 py-1 rounded text-xs">Active</span></td>
                </tr>`;
            });
        });
    </script>
</body>
</html>
