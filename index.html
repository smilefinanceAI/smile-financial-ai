<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smile Finance - Financial Products & Affiliate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-blue-50 font-sans">

    <header class="bg-white p-4 shadow-sm sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-blue-700">SMILE FINANCE</h1>
            <div class="flex space-x-4 text-gray-500">
                <i class="fas fa-search text-lg"></i>
                <i class="fas fa-bell text-lg"></i>
                <i class="fas fa-user-circle text-lg"></i>
            </div>
        </div>
    </header>

    <div class="p-4">
        <div class="bg-gradient-to-r from-blue-600 to-indigo-700 rounded-2xl p-6 text-white shadow-lg">
            <h2 class="text-2xl font-bold">Earn up to ₹50,000/Month</h2>
            <p class="text-blue-100 text-sm mt-2">Sell financial products and get instant payout.</p>
            <button class="mt-4 bg-white text-blue-700 px-4 py-2 rounded-lg font-bold text-sm">Join Now</button>
        </div>
    </div>

    <div class="px-4 py-2">
        <h3 class="font-bold text-gray-700 mb-4">Financial Products</h3>
        <div class="grid grid-cols-4 gap-4">
            <div class="flex flex-col items-center">
                <div class="bg-white p-4 rounded-2xl shadow-sm mb-2"><i class="fas fa-credit-card text-blue-500 text-xl"></i></div>
                <span class="text-[10px] font-bold text-gray-600 uppercase">Cards</span>
            </div>
            <div class="flex flex-col items-center">
                <div class="bg-white p-4 rounded-2xl shadow-sm mb-2"><i class="fas fa-hand-holding-usd text-green-500 text-xl"></i></div>
                <span class="text-[10px] font-bold text-gray-600 uppercase">Loans</span>
            </div>
            <div class="flex flex-col items-center">
                <div class="bg-white p-4 rounded-2xl shadow-sm mb-2"><i class="fas fa-shield-alt text-orange-500 text-xl"></i></div>
                <span class="text-[10px] font-bold text-gray-600 uppercase">Insurance</span>
            </div>
            <div class="flex flex-col items-center">
                <div class="bg-white p-4 rounded-2xl shadow-sm mb-2"><i class="fas fa-piggy-bank text-pink-500 text-xl"></i></div>
                <span class="text-[10px] font-bold text-gray-600 uppercase">Saving</span>
            </div>
        </div>
    </div>

    <div class="p-4">
        <h3 class="font-bold text-gray-700 mb-4">Trending Offers</h3>
        <div id="product-list" class="space-y-4">
            <p class="text-center text-gray-400 py-10">Loading latest offers...</p>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD3FEfP9Htj3ANvIENwzlNIKZRE7qIYFBc",
            authDomain: "smile-finance-ai-2026.firebaseapp.com",
            databaseURL: "https://smile-finance-ai-2026-default-rtdb.firebaseio.com",
            projectId: "smile-finance-ai-2026",
            storageBucket: "smile-finance-ai-2026.firebasestorage.app",
            messagingSenderId: "325593143394",
            appId: "1:325593143394:web:2b5f3c2404279d4594d93b"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Listen for Real-time Updates
        database.ref('products/').on('value', (snapshot) => {
            const productList = document.getElementById('product-list');
            productList.innerHTML = ""; // Clear loader

            snapshot.forEach((childSnapshot) => {
                const data = childSnapshot.val();
                
                // Card Template
                productList.innerHTML += `
                    <div class="bg-white rounded-2xl p-4 shadow-sm border border-blue-100 flex items-center justify-between">
                        <div class="flex items-center space-x-4">
                            <img src="${data.image || 'https://via.placeholder.com/60'}" class="w-14 h-14 rounded-xl object-contain border">
                            <div>
                                <h4 class="font-bold text-gray-800 text-sm">${data.name}</h4>
                                <p class="text-green-600 font-bold text-xs mt-1">Earn ${data.payout}</p>
                                <p class="text-[10px] text-gray-400 mt-1">${data.desc.substring(0, 30)}...</p>
                            </div>
                        </div>
                        <a href="${data.link}" target="_blank" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-xs font-bold shadow-md">Apply</a>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
