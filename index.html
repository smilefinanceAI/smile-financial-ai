<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smile Finance AI | Official</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav class="navbar">
        <a href="#" class="logo">SMILE FINANCE <span>AI</span></a>
        <div class="nav-links">
            </div>
    </nav>

    <header class="hero">
        <div class="video-bg">
            <video autoplay muted loop playsinline id="heroVideo"></video>
        </div>
        <div class="hero-content">
            <h1>CIBIL Kharab Hai? <br><span>Fikar Mat Karein!</span></h1>
            <p>2018 se trusted financial solutions. 1200+ experts ki team aapke saath hai.</p>
            <a href="#lead-form" class="btn-main" style="width:auto; padding: 15px 40px;">Apply Now 🚀</a>
        </div>
    </header>

    <section class="services">
        <h2 class="section-title">Hamari Services</h2>
        <div class="service-grid" id="dynamicServices">
            </div>
    </section>

    <section class="form-section" id="lead-form">
        <div class="form-wrapper">
            <h2 style="margin-bottom:20px; text-align:center;">Instant Check</h2>
            <form id="mainLeadForm">
                <input type="text" id="custName" placeholder="Pura Naam" required>
                <input type="tel" id="custPhone" placeholder="WhatsApp Number" required>
                <button type="submit" class="btn-main">Get Free Consultation</button>
            </form>
        </div>
    </section>

    <script src="js/script.js" type="module"></script>
</body>
</html>
