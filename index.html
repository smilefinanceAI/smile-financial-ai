<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smile Finance - Best Financial Deals</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-blue-50">

    <header class="bg-white p-4 sticky top-0 z-50 shadow-sm border-b border-blue-100 flex justify-between items-center">
        <div class="flex items-center space-x-2">
            <div class="w-10 h-10 bg-blue-700 rounded-lg flex items-center justify-center text-white font-black">SF</div>
            <h1 class="text-sm font-black text-slate-800 leading-none uppercase tracking-tighter">Smile Finance</h1>
        </div>
        <div class="bg-blue-50 px-3 py-1 rounded-full"><span class="text-xs font-bold text-blue-700">₹0.00</span></div>
    </header>

    <div class="p-4 flex space-x-4 overflow-x-auto">
        <button class="bg-blue-600 text-white px-6 py-2 rounded-full text-xs font-bold">All</button>
        <button class="bg-white text-gray-500 px-6 py-2 rounded-full text-xs font-bold border">Cards</button>
        <button class="bg-white text-gray-500 px-6 py-2 rounded-full text-xs font-bold border">Loans</button>
    </div>

    <div class="p-4 grid grid-cols-1 md:grid-cols-2 gap-4" id="live-products">
        </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD3FEfP9Htj3ANvIENwzlNIKZRE7qIYFBc",
            authDomain: "smile-finance-ai-2026.firebaseapp.com",
            databaseURL: "https://smile-finance-ai-2026-default-rtdb.firebaseio.com",
            projectId: "smile-finance-ai-2026",
            storageBucket: "smile-finance-ai-2026.firebasestorage.app",
            messagingSenderId: "325593143394",
            appId: "1:325593143394:web:2b5f3c2404279d4594d93b"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        database.ref('products/').on('value', (snapshot) => {
            const container = document.getElementById('live-products');
            container.innerHTML = "";
            snapshot.forEach((child) => {
                const prod = child.val();
                container.innerHTML += `
                    <div class="bg-white p-4 rounded-3xl border border-blue-100 shadow-sm flex items-center justify-between">
                        <div class="flex items-center space-x-4">
                            <img src="${prod.image}" class="w-14 h-14 rounded-2xl object-cover">
                            <div>
                                <h4 class="font-black text-slate-800 text-sm">${prod.name}</h4>
                                <span class="text-green-600 font-bold text-xs">Earn ₹${prod.payout}</span>
                            </div>
                        </div>
                        <a href="${prod.link}" target="_blank" onclick="trackLead('${prod.name}')" class="bg-blue-600 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase shadow-lg shadow-blue-200">Apply</a>
                    </div>
                `;
            });
        });

        function trackLead(pName) {
            database.ref('leads/').push({
                cust_name: "Customer Click",
                product_name: pName,
                channel: window.location.search || "Organic Web",
                timestamp: Date.now()
            });
        }
    </script>
</body>
</html>
